# Default values for dfm-process.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

streamer:
  enabled: true

nim:
  enabled: true
  overrideNgcAPIKey: ""
  shmSize: 4Gi
  tolerations: []
  nodeSelector: {}

dfm:
  cacheSize: 16Gi
  nodeSelector: {}

image:
  process:
    repository: earth2-weather-analytics-process
    tag: 0.1.0
    pullPolicy: Never
  scheduler:
    repository: earth2-weather-analytics-scheduler
    tag: 0.1.0
    pullPolicy: Never
  execute:
    repository: earth2-weather-analytics-execute
    tag: 0.1.0
    pullPolicy: Never
  streamer:
    repository: earth2-weather-analytics-streamer
    tag: 0.1.0
    pullPolicy: Never
  nim:
    repository: nvcr.io/nim/nvidia/fourcastnet
    tag: 1.0.0
    pullPolicy: IfNotPresent
  busybox:
    repository: busybox
    tag: 1.36.1
    pullPolicy: IfNotPresent

# NVCF requirement
ngcImagePullSecretName: docker-secret
ngcImageRegistryPath: ""

service:
  process:
    type: ClusterIP
    port: 8080

  execute:
    type: ClusterIP
    port: 8085

  scheduler:
    type: ClusterIP
    port: 8082

  streamer:
    credsPort: 8011
    proxyPort: 49100

  nim:
    type: ClusterIP
    port: 8086

otel:
  collector: "http://jaeger-collector:4317"
  traces_exporter: none

resources: {}

execute:
  resources:
    limits:
      cpu: 2
      memory: 4G
    requests:
      cpu: 1
      memory: 2G

logging:
  json:
    enabled: false

auth:
  secret: dfm-auth-secret
  method:
    key: method
  api_key:
    key: api_key

redis:
  host: "{{ .Release.Name }}-redis-master"
  port: 6379
  db: 0

  bitnami: true
  # we expect a secret created that contains redis password
  secretName: redis
  secretKey: password

  usePassword: false
  usePasswordFiles: false

  auth:
    enabled: false

  networkPolicy:
    enabled: false

  image:
    repository: redis/redis-stack-server
    tag: 7.2.0-v11

  master:
    enabled: true
    persistence:
      enabled: false
      sizeLimit: 128Mi
    enableServiceLinks: false
    containerSecurityContext:
      enabled: false
    resources:
      requests:
        cpu: 250m
        memory: 1G
      limits:
        cpu: 500m
        memory: 2G
    extraEnvVars:
      - name: REDIS_MAXMEMORY
        valueFrom:
          resourceFieldRef:
            containerName: redis
            resource: requests.memory
            divisor: 1Mi  # Convert bytes to MB
    extraFlags:
      - "--loadmodule /opt/redis-stack/lib/rejson.so"
      - "--appendonly no"
      - "--maxmemory-policy allkeys-lru"
      - "--maxmemory ${REDIS_MAXMEMORY}mb"

  replica:
    enabled: true
    replicaCount: 1
    persistence:
      enabled: false
      sizeLimit: 128Mi
    enableServiceLinks: false
    containerSecurityContext:
      enabled: false
    resources:
      requests:
        cpu: 250m
        memory: 1G
      limits:
        cpu: 500m
        memory: 2G
    extraEnvVars:
      - name: REDIS_MAXMEMORY
        valueFrom:
          resourceFieldRef:
            containerName: redis
            resource: requests.memory
            divisor: 1Mi  # Convert bytes to MB
    extraFlags:
      - "--loadmodule /opt/redis-stack/lib/rejson.so"
      - "--appendonly no"
      - "--maxmemory-policy allkeys-lru"
      - "--maxmemory ${REDIS_MAXMEMORY}mb"

# Additional volumes on the output Deployment definition.
volumes:
  - name: cache-volume
    persistentVolumeClaim:
      claimName: dfm-cache

# Additional volumeMounts on the output Deployment definition.
volumeMounts:
  - name: cache-volume
    mountPath: /cache
    readOnly: false

site:
  name: mini1
  config:
    path: /etc/site-config
    file: config.yaml

  secrets:
    enabled: false
    path: /var/secrets
    name: dfm-execute-site-secrets
    file: secrets.json

# --- OpenShift Support ---
# All OpenShift-specific resources are gated behind this flag.
# When false (the default), the chart behaves identically to upstream
# and produces no OpenShift resources.
openshift:
  enabled: false

  # Create an OpenShift Route for external access to the process API.
  # When enabled, the process Service drops its headless (clusterIP: None)
  # setting so the Route has a ClusterIP to target.
  route:
    enabled: false
    host: ""
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect

  # SecurityContextConstraints RoleBinding for pods that need to run
  # with arbitrary UIDs (most NVIDIA containers expect root or a fixed UID).
  scc:
    create: false
    priority: 10

# --- NIM Operator Integration ---
# When the NIM Operator is installed (provides apps.nvidia.com/v1alpha1),
# FourCastNet can be deployed as a NIMCache + NIMService pair instead of
# a raw Deployment.  The NIM Operator handles model downloading, caching,
# and GPU scheduling.
#
# To use, set nimOperator.fourcastnet.enabled: true and nim.enabled: false
# (the values-openshift.yaml overlay does this automatically).
nimOperator:
  ngcApiSecretName: ngc-catalog-secret

  fourcastnet:
    enabled: false
    replicas: 1
    image:
      repository: nvcr.io/nim/nvidia/fourcastnet
      tag: "1.0.0"
      pullPolicy: IfNotPresent
    resources:
      limits:
        nvidia.com/gpu: 1
      requests:
        nvidia.com/gpu: 1
    storage:
      pvc:
        create: true
        size: "50Gi"
        volumeAccessMode: ReadWriteOnce
        storageClass: ""
      sharedMemorySizeLimit: "4Gi"
    env:
      - name: NIM_HTTP_API_PORT
        value: "8086"
    expose:
      service:
        name: inference
        type: ClusterIP
        port: 8086
    nodeSelector: {}
    tolerations: []
