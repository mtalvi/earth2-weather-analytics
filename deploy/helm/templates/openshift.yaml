{{- if .Values.openshift.enabled }}
{{- $route := .Values.openshift.route | default dict }}
{{- if $route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Release.Name }}-process
  labels:
    {{- include "earth2.labels" . | nindent 4 }}
spec:
  {{- if $route.host }}
  host: {{ $route.host }}
  {{- end }}
  to:
    kind: Service
    name: {{ .Release.Name }}-process
    weight: 100
  port:
    targetPort: http-process
  tls:
    termination: {{ $route.tls.termination | default "edge" }}
    {{- if ne ($route.tls.termination | default "edge") "passthrough" }}
    insecureEdgeTerminationPolicy: {{ $route.tls.insecureEdgeTerminationPolicy | default "Redirect" }}
    {{- end }}
{{- end }}
{{- if .Values.openshift.scc.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-anyuid-scc
  labels:
    {{- include "earth2.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: default
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
